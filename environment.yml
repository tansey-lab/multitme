name: multitme
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python>=3.12
  - pytorch::pytorch
  - pytorch::pytorch-cuda=12.4
  - conda-forge::libstdcxx-ng
  - numpy>=1.24
  - conda-forge::matplotlib-venn>=0.11.6
  - conda-forge::plotly>=5.18
  - conda-forge::umap-learn>=0.5
  - scanpy>=1.9
  - anndata>=0.10
  - omegaconf>=2.3
  - wandb>=0.16
  - pip
  - pip:
      - -e .
      - multiqc>=1.33
